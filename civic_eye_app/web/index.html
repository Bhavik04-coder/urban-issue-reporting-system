<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="civic_eye_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>CivicEye</title>
  <link rel="manifest" href="manifest.json">
  <!-- Google Maps JS API — replace YOUR_API_KEY with a real key for map features -->
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script>
</head>
<body>
  <script>
    // Register sqflite service worker for web SQLite support
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sqflite_sw.js').then(function(reg) {
        console.log('sqflite SW registered:', reg.scope);
      }).catch(function(err) {
        console.warn('sqflite SW registration failed:', err);
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
